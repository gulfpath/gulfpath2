steps:
  # 1. Container Compilation with Explicit Argument Injections
  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'build'
      - '--build-arg'
      - 'GEMINI_API_KEY=${_GEMINI_API_KEY}'
      - '-t'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/gulfpath-new:$COMMIT_SHA'
      - '.'

  # 2. Artifact Registry Registration
  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'push'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/gulfpath-new:$COMMIT_SHA'

  # 3. Cloud Run Deployment Execution
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'gulfpath-new'
      - '--image'
      - 'europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/gulfpath-new:$COMMIT_SHA'
      - '--region'
      - 'europe-west1'
